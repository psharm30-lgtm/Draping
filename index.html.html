<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>Cloth</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; overflow:hidden; }
canvas { display:block; }
#hud {
  position:fixed; top:50%; left:0;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.72);
  color:#ccc;
  font-size:12px;
  padding:16px 14px;
  font-family:monospace;
  display:flex;
  flex-direction:column;
  gap:10px;
  border-radius:0 10px 10px 0;
  min-width:170px;
  z-index:10;
}
#hud b { color:#6ddc9f; }
#hud .title {
  color:#fff;
  font-size:11px;
  letter-spacing:1px;
  text-transform:uppercase;
  border-bottom:1px solid rgba(255,255,255,0.15);
  padding-bottom:8px;
  margin-bottom:2px;
}
#hud span { display:flex; justify-content:space-between; gap:10px; }
#hud span b { min-width:28px; text-align:right; }
#mode { position:fixed; top:12px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.7); color:#ffcc44; font-family:monospace;
  font-size:13px; padding:5px 16px; border-radius:20px;
  pointer-events:none; opacity:0; transition:opacity 0.3s; }
#mode.show { opacity:1; }
</style>
</head>

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const modeEl = document.getElementById('mode');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;

const dfImg     = new Image();
dfImg.src     = 'data:image/png;base64,' + DF_B64;
const swatchImg = new Image();
swatchImg.src = 'data:image/png;base64,' + SWATCH_B64;

// Off-screen canvas for the swatch so we can createPattern
let swatchPattern = null;
const offscreen   = document.createElement('canvas');
swatchImg.onload  = () => {
  offscreen.width  = swatchImg.naturalWidth;
  offscreen.height = swatchImg.naturalHeight;
  offscreen.getContext('2d').drawImage(swatchImg, 0, 0);
  swatchPattern = ctx.createPattern(offscreen, 'repeat');
};

// ── Cloth config ────────────────────────────────────────────────────────
let clothCols = 20, clothRows = 20;
const CELL_W  = 18, CELL_H = 18;
const GRAVITY = 0.45, DAMPING = 0.99, ITERS = 15;

// ── State ───────────────────────────────────────────────────────────────
let nodes = [], constraints = [];
let history = [], future = [];
let mode = '', modeTimer = null;
let showMesh = true;

function showMode(txt) {
  modeEl.textContent = txt;
  modeEl.classList.add('show');
  clearTimeout(modeTimer);
  modeTimer = setTimeout(() => modeEl.classList.remove('show'), 1400);
}

function serialise() {
  return {
    cols: clothCols, rows: clothRows,
    nodes: nodes.map(n => ({...n})),
    constraints: constraints.map(c => ({...c}))
  };
}
function saveState() { future=[]; history.push(serialise()); if(history.length>60)history.shift(); }
function restore(s) { clothCols=s.cols; clothRows=s.rows; nodes=s.nodes.map(n=>({...n})); constraints=s.constraints.map(c=>({...c})); }
function undo() { if(!history.length)return; future.push(serialise()); restore(history.pop()); showMode('Undo'); }
function redo() { if(!future.length)return; history.push(serialise()); restore(future.pop()); showMode('Redo'); }

// ── Init cloth ──────────────────────────────────────────────────────────
function initCloth() {
  nodes=[]; constraints=[];
  const totalW=(clothCols-1)*CELL_W, totalH=(clothRows-1)*CELL_H;
  const startX=canvas.width/2-totalW/2, startY=canvas.height*0.10;
  for(let r=0;r<clothRows;r++)
    for(let c=0;c<clothCols;c++)
      nodes.push({x:startX+c*CELL_W,y:startY+r*CELL_H,px:startX+c*CELL_W,py:startY+r*CELL_H,pinned:false});
  for(let r=0;r<clothRows;r++)
    for(let c=0;c<clothCols;c++){
      const i=r*clothCols+c;
      if(c<clothCols-1) addC(i,i+1);
      if(r<clothRows-1) addC(i,i+clothCols);
    }
  pinRow0(Math.round((clothCols-1)*0.30));
  pinRow0(Math.round((clothCols-1)*0.70));
}
function addC(a,b){ const dx=nodes[a].x-nodes[b].x,dy=nodes[a].y-nodes[b].y; constraints.push({a,b,rest:Math.hypot(dx,dy)}); }
function pinRow0(col){ const n=nodes[col]; n.pinned=true; }

// ── Simulate ────────────────────────────────────────────────────────────
function simulate() {
  for(const n of nodes){
    if(n.pinned)continue;
    const vx=(n.x-n.px)*DAMPING,vy=(n.y-n.py)*DAMPING;
    n.px=n.x;n.py=n.y;
    n.x+=vx;n.y+=vy+GRAVITY;
    if(n.y>canvas.height-30){n.y=canvas.height-30;n.py=n.y+vy*0.4;}
  }
  for(let i=0;i<ITERS;i++)
    for(const c of constraints){
      const a=nodes[c.a],b=nodes[c.b];
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||0.001;
      const f=(d-c.rest)/d*0.5;
      if(!a.pinned){a.x+=dx*f;a.y+=dy*f;}
      if(!b.pinned){b.x-=dx*f;b.y-=dy*f;}
    }
}

// ── Draw fabric quads with affine texture mapping ───────────────────────
// Draws one triangle with the swatch texture correctly warped to it
function drawTexturedTri(p0, p1, p2, u0,v0, u1,v1, u2,v2) {
  if (!swatchPattern) return;
  const sw = offscreen.width, sh = offscreen.height;
  // Solve affine: texture (u,v) -> screen (x,y)
  const x0=p0.x,y0=p0.y, x1=p1.x,y1=p1.y, x2=p2.x,y2=p2.y;
  const tu0=u0*sw,tv0=v0*sh, tu1=u1*sw,tv1=v1*sh, tu2=u2*sw,tv2=v2*sh;
  const denom=(tu1-tu0)*(tv2-tv0)-(tu2-tu0)*(tv1-tv0);
  if(Math.abs(denom)<0.001)return;
  const a=((x1-x0)*(tv2-tv0)-(x2-x0)*(tv1-tv0))/denom;
  const b=((x2-x0)*(tu1-tu0)-(x1-x0)*(tu2-tu0))/denom;
  const c2=x0-a*tu0-b*tv0;
  const d=((y1-y0)*(tv2-tv0)-(y2-y0)*(tv1-tv0))/denom;
  const e=((y2-y0)*(tu1-tu0)-(y1-y0)*(tu2-tu0))/denom;
  const f2=y0-d*tu0-e*tv0;

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.lineTo(x2,y2);
  ctx.closePath();
  ctx.clip();
  ctx.transform(a,d,b,e,c2,f2);
  ctx.fillStyle = swatchPattern;
  ctx.fillRect(0,0,sw,sh);
  ctx.restore();
}

// Lighting: darken/lighten based on how much a quad is compressed vs stretched
function quadShade(p00,p10,p01,p11) {
  // Cross product of diagonals gives area proxy
  const ax=p11.x-p00.x, ay=p11.y-p00.y;
  const bx=p10.x-p01.x, by=p10.y-p01.y;
  const area=Math.abs(ax*by-ay*bx);
  const restArea=CELL_W*CELL_H*2; // two triangles
  const ratio=Math.min(1.3,Math.max(0.2,area/restArea));
  return ratio;
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#111';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Dress form
  if(dfImg.complete&&dfImg.naturalWidth){
    const scale=Math.min(canvas.width/dfImg.naturalWidth,canvas.height/dfImg.naturalHeight)*0.82;
    const iw=dfImg.naturalWidth*scale,ih=dfImg.naturalHeight*scale;
    ctx.drawImage(dfImg,(canvas.width-iw)/2,(canvas.height-ih)/2,iw,ih);
  }

  // Build a fast lookup set of existing constraints
  const segSet = new Set();
  for(const c of constraints){
    segSet.add(c.a+'_'+c.b);
    segSet.add(c.b+'_'+c.a);
  }
  function hasEdge(a,b){ return segSet.has(a+'_'+b); }

  // Draw fabric quads only where all 4 edges of the quad still exist
  for(let r=0;r<clothRows-1;r++) {
    for(let c=0;c<clothCols-1;c++) {
      const i00=r*clothCols+c;
      const i10=i00+1;
      const i01=i00+clothCols;
      const i11=i00+clothCols+1;

      // Only draw this quad if all 4 structural edges are intact
      if(!hasEdge(i00,i10) && !hasEdge(i10,i00)) continue;
      if(!hasEdge(i00,i01) && !hasEdge(i01,i00)) continue;
      if(!hasEdge(i10,i11) && !hasEdge(i11,i10)) continue;
      if(!hasEdge(i01,i11) && !hasEdge(i11,i01)) continue;

      const p00=nodes[i00], p10=nodes[i10];
      const p01=nodes[i01], p11=nodes[i11];

      // UV: map cloth grid position to [0,1] across swatch
      const u00=c/(clothCols-1),     v00=r/(clothRows-1);
      const u10=(c+1)/(clothCols-1), v10=r/(clothRows-1);
      const u01=c/(clothCols-1),     v01=(r+1)/(clothRows-1);
      const u11=(c+1)/(clothCols-1), v11=(r+1)/(clothRows-1);

      // Draw two textured triangles
      drawTexturedTri(p00,p10,p01, u00,v00, u10,v10, u01,v01);
      drawTexturedTri(p10,p11,p01, u10,v10, u11,v11, u01,v01);

      // Shading overlay
      const bright=quadShade(p00,p10,p01,p11);
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(p00.x,p00.y);ctx.lineTo(p10.x,p10.y);
      ctx.lineTo(p11.x,p11.y);ctx.lineTo(p01.x,p01.y);
      ctx.closePath();
      if(bright<0.85){
        ctx.fillStyle=`rgba(20,15,10,${Math.min(0.5,(0.85-bright)*0.9)})`;
        ctx.fill();
      } else if(bright>1.05){
        ctx.fillStyle=`rgba(255,250,240,${Math.min(0.35,(bright-1.05)*0.8)})`;
        ctx.fill();
      }
      ctx.restore();
    }
  }

  // Thin edge lines so seams are visible
  if(showMesh){
    ctx.strokeStyle='rgba(0,0,0,0.12)';
    ctx.lineWidth=0.5;
    for(const c of constraints){
      const a=nodes[c.a],b=nodes[c.b];
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
    }
  }

  // Cut highlight
  if(mode==='cut'){
    for(const c of constraints){
      const a=nodes[c.a],b=nodes[c.b];
      if(segNearMouse(a,b)){
        ctx.strokeStyle='rgba(255,60,60,0.85)';
        ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
      }
    }
    ctx.beginPath();ctx.arc(mouseX,mouseY,10,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,60,60,0.6)';ctx.lineWidth=1.5;ctx.stroke();
  }

  // Green pins
  for(const n of nodes){
    if(!n.pinned)continue;
    ctx.beginPath();
    ctx.arc(n.x,n.y,dragNode===n?11:8,0,Math.PI*2);
    ctx.fillStyle=dragNode===n?'#ffcc44':'#44dd88';
    ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
  }
}

// ── Mouse ───────────────────────────────────────────────────────────────
let dragNode=null, mouseX=0, mouseY=0, isCutting=false;

function segNearMouse(a,b){
  const dx=b.x-a.x,dy=b.y-a.y,l2=dx*dx+dy*dy;
  if(!l2)return false;
  const t=Math.max(0,Math.min(1,((mouseX-a.x)*dx+(mouseY-a.y)*dy)/l2));
  return Math.hypot(mouseX-a.x-t*dx,mouseY-a.y-t*dy)<18;
}

canvas.addEventListener('mousedown',e=>{
  mouseX=e.clientX;mouseY=e.clientY;
  if(mode==='pin'){
    saveState();
    let best=Infinity,bn=null;
    for(const n of nodes){const d=Math.hypot(n.x-e.clientX,n.y-e.clientY);if(d<best){best=d;bn=n;}}
    if(bn&&best<40){bn.pinned=true;bn.px=bn.x;bn.py=bn.y;}
    return;
  }
  if(mode==='cut'){isCutting=true;return;}
  for(const n of nodes){
    if(!n.pinned)continue;
    if(Math.hypot(n.x-e.clientX,n.y-e.clientY)<20){dragNode=n;break;}
  }
});
canvas.addEventListener('mousemove',e=>{
  mouseX=e.clientX;mouseY=e.clientY;
  if(dragNode){dragNode.x=e.clientX;dragNode.y=e.clientY;dragNode.px=e.clientX;dragNode.py=e.clientY;return;}
  if(isCutting&&mode==='cut'){
    const before=constraints.length;
    constraints=constraints.filter(c=>!segNearMouse(nodes[c.a],nodes[c.b]));
    if(constraints.length<before)saveState();
  }
});
canvas.addEventListener('mouseup',()=>{dragNode=null;isCutting=false;});
canvas.addEventListener('contextmenu',e=>e.preventDefault());

// ── Keys ────────────────────────────────────────────────────────────────
window.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(k==='r'){saveState();initCloth();showMode('Reset');return;}
  if(k==='z'){undo();return;}
  if(k==='y'){redo();return;}
  if(k==='t'){mode=mode==='pin'?'':'pin';canvas.style.cursor=mode==='pin'?'crosshair':'default';showMode(mode==='pin'?'Pin mode — click node':'Normal mode');return;}
  if(k==='c'){mode=mode==='cut'?'':'cut';canvas.style.cursor=mode==='cut'?'crosshair':'default';showMode(mode==='cut'?'Cut mode — drag over cloth':'Normal mode');return;}
  if(k==='w'){saveState();clothCols=Math.min(clothCols+2,40);initCloth();showMode('Wider ('+clothCols+' cols)');return;}
  if(k==='n'){saveState();clothCols=Math.max(clothCols-2,6);initCloth();showMode('Narrower ('+clothCols+' cols)');return;}
  if(k==='l'){saveState();clothRows=Math.min(clothRows+2,40);initCloth();showMode('Longer ('+clothRows+' rows)');return;}
  if(k==='s'){saveState();clothRows=Math.max(clothRows-2,6);initCloth();showMode('Shorter ('+clothRows+' rows)');return;}
  if(k==='x'){showMesh=!showMesh;showMode(showMesh?'Mesh on':'Mesh off');return;}
});

window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});

initCloth();
(function loop(){simulate();draw();requestAnimationFrame(loop);})();
</script>
</body>
